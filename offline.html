<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offline — Xnipertools</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.ico" sizes="32x32"><link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#070809;color:#f2f4f8;
    min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;line-height:1.6}
  .wrap{max-width:380px}
  .ic{font-size:3.4rem;margin-bottom:18px}
  h1{font-size:1.6rem;font-weight:700;margin-bottom:10px}
  p{color:#9398a6;font-size:.98rem;margin-bottom:24px}
  button{cursor:pointer;border:none;border-radius:12px;padding:13px 28px;font-size:.96rem;font-weight:600;font-family:inherit;color:#fff;
    background:linear-gradient(135deg,#6f97f5,#3f63d8);box-shadow:0 8px 26px rgba(63,99,216,.32)}
  button:hover{filter:brightness(1.08)}
  .brand{margin-top:28px;font-size:.82rem;color:#666b78}
  .brand b{color:#c7d4ff}
</style>
</head>
<body>
  <div class="wrap">
    <div class="ic">📡</div>
    <h1>You're offline</h1>
    <p>Looks like your internet dropped. Xnipertools needs a connection to load. Reconnect and try again.</p>
    <button onclick="location.reload()">↻ Try again</button>
    <div class="brand">Xniper<b>tools</b> · free online tools</div>
  </div>
</body>
</html>
