<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Announce · XCipher Admin</title>
<meta name="robots" content="noindex, follow">
<meta name="theme-color" content="#070b12">
<link rel="icon" href="/favicon.ico" sizes="any">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#070b12;--ink2:#0a1019;--panel:#0e1626;--line:rgba(120,170,255,.12);--line2:rgba(120,170,255,.22);
  --txt:#e7eefb;--mut:#8ea3c4;--dim:#6c80a3;--mint:#46f3c6;--cyan:#46c6ff;--rose:#ff6b8b;--amber:#ffb454;
  --mono:'JetBrains Mono',ui-monospace,monospace;--disp:'Sora',system-ui,sans-serif;}
*{box-sizing:border-box}
body{margin:0;background:var(--ink);color:var(--txt);font-family:Inter,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:100%;max-width:480px;background:linear-gradient(180deg,var(--panel),var(--ink2));border:1px solid var(--line2);border-radius:22px;padding:30px}
h1{font:800 22px/1.1 var(--disp);margin:0 0 4px}
.sub{font:500 12px/1 var(--mono);color:var(--dim);margin:0 0 22px}
label{font:700 10px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--mint);display:block;margin:0 0 8px}
input,textarea,select{width:100%;background:var(--ink);border:1px solid var(--line2);color:var(--txt);font:500 14px/1.4 Inter;padding:12px 13px;border-radius:11px;outline:none;margin-bottom:16px}
textarea{resize:vertical;min-height:70px}input:focus,textarea:focus,select:focus{border-color:var(--mint)}
.row{display:flex;gap:10px}.row>div{flex:1}
.btn{flex:1;border:0;cursor:pointer;font:700 14px/1 Inter;padding:14px;border-radius:12px}
.post{color:#04121a;background:linear-gradient(135deg,var(--mint),var(--cyan))}
.clear{color:var(--rose);background:rgba(255,107,139,.08);border:1px solid rgba(255,107,139,.3)}
.btns{display:flex;gap:10px;margin-top:4px}
.msg{font:500 12.5px/1.5 var(--mono);text-align:center;margin-top:14px;min-height:18px}
.msg.ok{color:var(--mint)}.msg.err{color:var(--rose)}
.cur{margin-top:20px;padding:14px;border:1px dashed var(--line2);border-radius:12px;font:500 12.5px/1.5 var(--mono);color:var(--mut)}
.cur b{color:var(--txt)}
</style>
</head>
<body>
<div class="card">
  <h1>📢 Post an announcement</h1>
  <p class="sub">Shows as a banner on XCipher. Admin only.</p>

  <label>Secret key</label>
  <input type="password" id="key" placeholder="Announcement key" autocomplete="off">

  <label>Message</label>
  <textarea id="text" maxlength="300" placeholder="e.g. New game just dropped — play free!"></textarea>

  <label>Link (optional)</label>
  <input type="text" id="link" placeholder="https://xnipertools.com/...">

  <div class="btns">
    <button class="btn post" id="post">Publish</button>
    <button class="btn clear" id="clear">Clear</button>
  </div>
  <div class="msg" id="msg"></div>
  <div class="cur" id="cur">Loading current…</div>
</div>

<script>
var DEV=location.hostname==='localhost'||location.hostname==='127.0.0.1';
var HTTP=DEV?'http://localhost:8787':'https://xcipher.nazimtariq74074.workers.dev';
var msg=document.getElementById('msg');
function show(t,ok){msg.textContent=t;msg.className='msg '+(ok?'ok':'err');}
function loadCur(){fetch(HTTP+'/api/announce').then(function(r){return r.json();}).then(function(d){
  document.getElementById('cur').innerHTML=d.announcement?('Live now: <b>'+d.announcement.text.replace(/[<>&]/g,'')+'</b>'+(d.announcement.link?'<br>→ '+d.announcement.link:'')):'No announcement live.';
}).catch(function(){document.getElementById('cur').textContent='(server offline)';});}
loadCur();
document.getElementById('post').addEventListener('click',function(){
  var key=document.getElementById('key').value.trim();
  var text=document.getElementById('text').value.trim();
  var link=document.getElementById('link').value.trim();
  if(!key)return show('Enter the secret key.',false);
  if(!text)return show('Enter a message.',false);
  fetch(HTTP+'/api/announce?key='+encodeURIComponent(key),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text,link:link})})
    .then(function(r){return r.json().then(function(j){return{s:r.status,j:j};});})
    .then(function(o){if(o.s===200&&o.j.ok){show('✅ Published!',true);loadCur();}else if(o.s===401){show('Wrong key.',false);}else{show('Error: '+(o.j.error||o.s),false);}})
    .catch(function(){show('Could not reach server.',false);});
});
document.getElementById('clear').addEventListener('click',function(){
  var key=document.getElementById('key').value.trim();
  if(!key)return show('Enter the secret key.',false);
  fetch(HTTP+'/api/announce?key='+encodeURIComponent(key),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clear:true})})
    .then(function(r){return r.json().then(function(j){return{s:r.status,j:j};});})
    .then(function(o){if(o.s===200){show('🗑️ Cleared.',true);loadCur();}else{show('Wrong key.',false);}})
    .catch(function(){show('Could not reach server.',false);});
});
</script>
</body>
</html>
