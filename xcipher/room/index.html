<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>Secure Room · XCipher</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#070b12">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#070b12;--ink2:#0a1019;--panel:#0e1626;--panel2:#111d31;--line:rgba(120,170,255,.12);--line2:rgba(120,170,255,.22);
  --txt:#e7eefb;--mut:#8ea3c4;--dim:#6c80a3;--mint:#46f3c6;--cyan:#46c6ff;--violet:#9b8cff;--amber:#ffb454;--rose:#ff6b8b;
  --mono:'JetBrains Mono',ui-monospace,monospace;--disp:'Sora',system-ui,sans-serif;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{background:radial-gradient(120% 90% at 80% -10%,rgba(70,243,198,.08),transparent 50%),radial-gradient(120% 90% at 0% 0%,rgba(155,140,255,.08),transparent 45%),var(--ink);
  color:var(--txt);font-family:Inter,sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100dvh;max-width:780px;margin:0 auto;border-left:1px solid var(--line);border-right:1px solid var(--line)}
.bar{display:flex;align-items:center;gap:12px;padding:12px 16px;background:linear-gradient(180deg,var(--panel),var(--ink2));border-bottom:1px solid var(--line);z-index:3}
.bar .logo{width:30px;height:30px;flex:0 0 auto;display:grid;place-items:center}.bar .logo svg{width:30px;height:30px}
.bar .meta{flex:1;min-width:0}
.bar .rt{font:700 15px/1.1 var(--disp);color:var(--txt);display:flex;align-items:center;gap:8px}
.bar .rt .lock{color:var(--mint)}
.bar .sub{font:500 11.5px/1.3 var(--mono);color:var(--dim);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.bar .sub b{color:var(--cyan);font-weight:600}
.bar .timer{flex:0 0 auto;font:700 12px/1 var(--mono);color:var(--amber);background:rgba(255,180,84,.1);border:1px solid rgba(255,180,84,.3);padding:8px 11px;border-radius:10px;text-align:center;min-width:64px}
.bar .leave{flex:0 0 auto;font:600 13px/1 Inter;color:var(--rose);background:rgba(255,107,139,.08);border:1px solid rgba(255,107,139,.28);padding:9px 13px;border-radius:10px;cursor:pointer;text-decoration:none}
.feed{flex:1;overflow-y:auto;padding:18px 16px 8px;display:flex;flex-direction:column;gap:10px}
.feed::-webkit-scrollbar{width:8px}.feed::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}
.msg{max-width:78%;display:flex;flex-direction:column;gap:3px}
.msg .who{font:600 11px/1 var(--mono);padding-left:2px}
.msg .bub{background:var(--panel);border:1px solid var(--line);padding:9px 13px;border-radius:14px;font:400 14.5px/1.45 Inter;color:var(--txt);overflow-wrap:anywhere}
.msg .tm{font:500 10px/1 var(--mono);color:var(--dim);padding-left:2px}
.msg.me{align-self:flex-end;align-items:flex-end}.msg.me .bub{background:linear-gradient(180deg,#1d2a4a,#141f38);border-color:rgba(155,140,255,.35)}.msg.me .who{display:none}
.sys{align-self:center;font:500 12px/1.4 var(--mono);color:var(--dim);background:rgba(255,255,255,.03);border:1px solid var(--line);padding:6px 12px;border-radius:100px;text-align:center;max-width:90%}
.sys.join{color:var(--mint)}
.typing{height:18px;padding:0 18px 4px;font:500 11.5px/1 var(--mono);color:var(--dim)}
.encnote{font:500 11px/1 var(--mono);color:var(--dim);text-align:center;padding:6px}.encnote b{color:var(--mint)}
.composer{display:flex;gap:10px;align-items:flex-end;padding:12px 14px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(0deg,var(--panel),var(--ink2));border-top:1px solid var(--line)}
.composer textarea{flex:1;resize:none;max-height:120px;background:var(--ink);border:1px solid var(--line2);color:var(--txt);font:400 15px/1.4 Inter;padding:12px 14px;border-radius:14px;outline:none}
.composer textarea:focus{border-color:var(--mint)}
.composer .send{flex:0 0 auto;width:46px;height:46px;border:0;border-radius:50%;cursor:pointer;background:linear-gradient(135deg,var(--violet),var(--cyan));display:grid;place-items:center;transition:.15s}
.composer .send:hover{transform:scale(1.06)}.composer .send:disabled{opacity:.4;cursor:default;transform:none}
.composer .send svg{width:20px;height:20px;color:#04121a}
.overlay{position:fixed;inset:0;background:var(--ink);display:grid;place-items:center;z-index:10;transition:opacity .4s;padding:24px;text-align:center}
.overlay.hide{opacity:0;pointer-events:none}
.overlay .ring{width:54px;height:54px;border:3px solid var(--line2);border-top-color:var(--mint);border-radius:50%;margin:0 auto 18px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay h2{font:700 19px/1.25 var(--disp);margin:0 0 8px;color:var(--txt)}
.overlay p{font:500 13px/1.5 var(--mono);color:var(--dim);margin:0 0 18px;max-width:340px}
.overlay .home{font:600 14px/1 Inter;color:#04121a;background:linear-gradient(135deg,var(--mint),var(--cyan));padding:13px 22px;border-radius:12px;text-decoration:none}
.bigicon{font-size:42px;margin-bottom:10px}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <span class="logo"><svg viewBox="0 0 64 64" aria-hidden="true"><defs><linearGradient id="lg" gradientUnits="userSpaceOnUse" x1="20" y1="6" x2="46" y2="58"><stop offset="0" stop-color="#a6c0ff"/><stop offset="1" stop-color="#5e8bff"/></linearGradient></defs><g transform="rotate(45 32 32)" fill="url(#lg)"><rect x="26" y="5" width="12" height="16" rx="5"/><rect x="29.5" y="21" width="5" height="3"/><rect x="30.5" y="23" width="3" height="25"/><path d="M30 48 H34 L33 55 H31 Z"/></g><g transform="rotate(-45 32 32)" stroke="url(#lg)" stroke-width="4" fill="none" stroke-linecap="round"><path d="M27 9 A7 7 0 1 0 37 9"/><line x1="32" y1="14" x2="32" y2="44"/><circle cx="32" cy="51" r="6"/></g></svg></span>
    <div class="meta">
      <div class="rt"><span class="lock">🔒</span> Secure Room</div>
      <div class="sub"><span>👥 <b id="online">0</b></span><span>you are <b id="myAlias" style="color:var(--mint)">…</b></span></div>
    </div>
    <span class="timer" id="timer">--:--</span>
    <a class="leave" href="../">Leave</a>
  </div>
  <div class="feed" id="feed"></div>
  <div class="typing" id="typing"></div>
  <div class="encnote">🔒 <b>End-to-end encrypted</b> — even we can't read this · self-destructs on timer</div>
  <div class="composer">
    <textarea id="input" rows="1" placeholder="Type a secure message…" maxlength="1000" autocomplete="off"></textarea>
    <button class="send" id="send" disabled aria-label="Send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/></svg></button>
  </div>
</div>

<div class="overlay" id="overlay"><div class="box" id="ovBox"><div class="ring" id="ovRing"></div><h2 id="ovTitle">Opening secure room…</h2><p id="ovText">verifying your encryption key</p></div></div>

<script>
var DEV=location.hostname==='localhost'||location.hostname==='127.0.0.1';
var HTTP=DEV?'http://localhost:8787':'https://xcipher.nazimtariq74074.workers.dev';
var WSB=DEV?'ws://localhost:8787':'wss://xcipher.nazimtariq74074.workers.dev';

/* ---- crypto (AES-GCM, key never leaves this page) ---- */
function b64u(buf){var b=new Uint8Array(buf),s='';for(var i=0;i<b.length;i++)s+=String.fromCharCode(b[i]);return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
function ub64(str){str=str.replace(/-/g,'+').replace(/_/g,'/');while(str.length%4)str+='=';var bin=atob(str),b=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)b[i]=bin.charCodeAt(i);return b.buffer;}
function importKey(kb){return crypto.subtle.importKey('raw',ub64(kb),{name:'AES-GCM'},false,['encrypt','decrypt']);}
async function enc(key,text){var iv=crypto.getRandomValues(new Uint8Array(12));var ct=await crypto.subtle.encrypt({name:'AES-GCM',iv:iv},key,new TextEncoder().encode(text));return b64u(iv.buffer)+'.'+b64u(ct);}
async function dec(key,payload){var p=payload.split('.');var iv=new Uint8Array(ub64(p[0]));var ct=ub64(p[1]);var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,ct);return new TextDecoder().decode(pt);}

var feed=document.getElementById('feed'),input=document.getElementById('input'),send=document.getElementById('send'),
    onlineEl=document.getElementById('online'),myAliasEl=document.getElementById('myAlias'),timerEl=document.getElementById('timer'),
    overlay=document.getElementById('overlay'),ovTitle=document.getElementById('ovTitle'),ovText=document.getElementById('ovText'),ovBox=document.getElementById('ovBox'),typingEl=document.getElementById('typing');

var ws=null,myId=null,key=null,roomId=null,expiresAt=0,tick=null;

function esc(s){return s.replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function time(ts){var d=new Date(ts);return('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
function atBottom(){return feed.scrollHeight-feed.scrollTop-feed.clientHeight<80;}
function scroll(){feed.scrollTop=feed.scrollHeight;}
function addMsg(m){var stick=atBottom();var el=document.createElement('div');el.className='msg'+(m.id===myId?' me':'');el.innerHTML='<span class="who" style="color:'+(m.color||'#8ea3c4')+'">'+esc(m.alias||'?')+'</span><span class="bub">'+esc(m.text)+'</span><span class="tm">'+time(m.ts)+'</span>';feed.appendChild(el);if(stick)scroll();}
function addSys(t,c){var el=document.createElement('div');el.className='sys '+(c||'');el.textContent=t;feed.appendChild(el);if(atBottom())scroll();}

function die(icon,title,text){
  if(ws){try{ws.close();}catch(e){}}
  if(tick)clearInterval(tick);
  ovBox.innerHTML='<div class="bigicon">'+icon+'</div><h2>'+title+'</h2><p>'+text+'</p><a class="home" href="../">Back to XCipher</a>';
  overlay.classList.remove('hide');
}

function fmt(ms){if(ms<0)ms=0;var s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return(h>0?h+':':'')+('0'+m).slice(-2)+':'+('0'+ss).slice(-2);}
function startTimer(){if(tick)clearInterval(tick);tick=setInterval(function(){var left=expiresAt-Date.now();timerEl.textContent=fmt(left);if(left<=0){die('💨','Room expired','This temporary room reached its time limit and self-destructed. Nothing was saved.');}},1000);}

async function boot(){
  var hash=location.hash.slice(1);
  var parts=hash.split('.');
  if(parts.length<2||!/^t-[a-z0-9]{12}$/.test(parts[0])){die('🔗','Invalid link','This room link is broken or incomplete. Ask for a fresh link.');return;}
  roomId=parts[0];
  try{key=await importKey(parts[1]);}catch(e){die('🔑','Bad key','The encryption key in this link is invalid.');return;}
  // check room
  try{
    var info=await fetch(HTTP+'/api/temp/info?r='+roomId).then(function(r){return r.json();});
    if(info.expired){die('💨','Room expired','This room already self-destructed. Nothing was saved.');return;}
    if(!info.ok){die('🚫','Room not found','This room doesn’t exist anymore.');return;}
    expiresAt=info.expiresAt;
  }catch(e){die('📡','Server offline','Could not reach the server. Try again shortly.');return;}
  openWs();
}

function openWs(){
  ws=new WebSocket(WSB+'/api/temp/ws?r='+encodeURIComponent(roomId));
  var got=false;
  ws.onmessage=async function(ev){
    var m;try{m=JSON.parse(ev.data);}catch(e){return;}
    if(m.type==='welcome'){got=true;myId=m.id;myAliasEl.textContent=m.alias;onlineEl.textContent=m.online;expiresAt=m.expiresAt;overlay.classList.add('hide');startTimer();addSys('You joined as '+m.alias,'join');}
    else if(m.type==='chat'){try{var text=await dec(key,m.enc);addMsg({id:m.id,alias:m.alias,color:m.color,text:text,ts:m.ts});}catch(e){addMsg({id:m.id,alias:m.alias,color:m.color,text:'🔒 [could not decrypt]',ts:m.ts});}}
    else if(m.type==='presence'){onlineEl.textContent=m.online;}
    else if(m.type==='sys'){addSys(m.text);}
    else if(m.type==='typing'){typingEl.textContent=m.alias+' is typing…';clearTimeout(window._th);window._th=setTimeout(function(){typingEl.textContent='';},1500);}
    else if(m.type==='destroyed'){die('💨','Room destroyed','This room self-destructed. Nothing was saved.');}
  };
  ws.onclose=function(){if(!got){die('💨','Room unavailable','This room is full or has expired.');}};
  ws.onerror=function(){try{ws.close();}catch(e){}};
}

var lastTyping=0;
async function sendMsg(){var t=input.value.trim();if(!t||!ws||ws.readyState!==1||!key)return;var payload=await enc(key,t.slice(0,1000));ws.send(JSON.stringify({type:'chat',enc:payload}));input.value='';autosize();send.disabled=true;}
function autosize(){input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px';}
input.addEventListener('input',function(){autosize();send.disabled=!input.value.trim();var now=Date.now();if(ws&&ws.readyState===1&&now-lastTyping>1200){lastTyping=now;ws.send(JSON.stringify({type:'typing'}));}});
input.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
send.addEventListener('click',sendMsg);

boot();
</script>
</body>
</html>
