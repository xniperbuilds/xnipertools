<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>Public Lounge · XCipher</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#070b12">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#070b12;--ink2:#0a1019;--panel:#0e1626;--panel2:#111d31;
  --line:rgba(120,170,255,.12);--line2:rgba(120,170,255,.22);
  --txt:#e7eefb;--mut:#8ea3c4;--dim:#6c80a3;
  --mint:#46f3c6;--cyan:#46c6ff;--violet:#9b8cff;--amber:#ffb454;--rose:#ff6b8b;
  --mono:'JetBrains Mono',ui-monospace,monospace;--disp:'Sora',system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{background:radial-gradient(120% 90% at 80% -10%,rgba(70,243,198,.07),transparent 50%),
      radial-gradient(120% 90% at 0% 0%,rgba(70,150,255,.08),transparent 45%),var(--ink);
      color:var(--txt);font-family:Inter,sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100dvh;max-width:780px;margin:0 auto;border-left:1px solid var(--line);border-right:1px solid var(--line)}

/* top bar */
.bar{display:flex;align-items:center;gap:12px;padding:12px 16px;background:linear-gradient(180deg,var(--panel),var(--ink2));
  border-bottom:1px solid var(--line);position:relative;z-index:3}
.bar .logo{width:30px;height:30px;flex:0 0 auto;display:grid;place-items:center}
.bar .logo svg{width:30px;height:30px}
.bar .meta{flex:1;min-width:0}
.bar .rt{font:700 15px/1.1 var(--disp);color:var(--txt);display:flex;align-items:center;gap:8px}
.bar .rt .live{width:7px;height:7px;border-radius:50%;background:var(--mint);box-shadow:0 0 8px var(--mint);animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.bar .sub{font:500 11.5px/1.3 var(--mono);color:var(--dim);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.bar .sub b{color:var(--cyan);font-weight:600}
.bar .leave{flex:0 0 auto;font:600 13px/1 Inter;color:var(--rose);background:rgba(255,107,139,.08);
  border:1px solid rgba(255,107,139,.28);padding:9px 13px;border-radius:10px;cursor:pointer;transition:.2s;text-decoration:none}
.bar .leave:hover{background:rgba(255,107,139,.16)}

/* messages */
.feed{flex:1;overflow-y:auto;padding:18px 16px 8px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.feed::-webkit-scrollbar{width:8px}.feed::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}
.msg{max-width:78%;display:flex;flex-direction:column;gap:3px}
.msg .who{font:600 11px/1 var(--mono);letter-spacing:.02em;padding-left:2px}
.msg .bub{background:var(--panel);border:1px solid var(--line);padding:9px 13px;border-radius:14px;
  font:400 14.5px/1.45 Inter;color:var(--txt);word-wrap:break-word;overflow-wrap:anywhere}
.msg .tm{font:500 10px/1 var(--mono);color:var(--dim);padding-left:2px}
.msg.me{align-self:flex-end;align-items:flex-end}
.msg.me .bub{background:linear-gradient(180deg,#16324a,#102337);border-color:rgba(70,198,255,.35)}
.msg.me .who{display:none}
.sys{align-self:center;font:500 12px/1.4 var(--mono);color:var(--dim);background:rgba(255,255,255,.03);
  border:1px solid var(--line);padding:6px 12px;border-radius:100px;text-align:center;max-width:90%}
.sys.join{color:var(--mint)}.sys.leave{color:var(--rose)}

/* typing */
.typing{height:18px;padding:0 18px 4px;font:500 11.5px/1 var(--mono);color:var(--dim)}

/* composer */
.composer{display:flex;gap:10px;align-items:flex-end;padding:12px 14px calc(12px + env(safe-area-inset-bottom));
  background:linear-gradient(0deg,var(--panel),var(--ink2));border-top:1px solid var(--line)}
.composer textarea{flex:1;resize:none;max-height:120px;background:var(--ink);border:1px solid var(--line2);
  color:var(--txt);font:400 15px/1.4 Inter;padding:12px 14px;border-radius:14px;outline:none}
.composer textarea:focus{border-color:var(--mint)}
.composer .send{flex:0 0 auto;width:46px;height:46px;border:0;border-radius:50%;cursor:pointer;
  background:linear-gradient(135deg,var(--mint),var(--cyan));display:grid;place-items:center;transition:.15s}
.composer .send:hover{transform:scale(1.06)}.composer .send:disabled{opacity:.4;cursor:default;transform:none}
.composer .send svg{width:20px;height:20px;color:#04121a}

/* connecting overlay */
.overlay{position:fixed;inset:0;background:var(--ink);display:grid;place-items:center;z-index:10;transition:opacity .4s}
.overlay.hide{opacity:0;pointer-events:none}
.overlay .box{text-align:center}
.overlay .ring{width:54px;height:54px;border:3px solid var(--line2);border-top-color:var(--mint);border-radius:50%;
  margin:0 auto 18px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay h2{font:700 18px/1.2 var(--disp);margin:0 0 6px;color:var(--txt)}
.overlay p{font:500 12.5px/1.4 var(--mono);color:var(--dim);margin:0}
.encnote{font:500 11px/1 var(--mono);color:var(--dim);text-align:center;padding:6px}
.encnote b{color:var(--mint)}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <span class="logo"><svg viewBox="0 0 64 64" aria-hidden="true"><defs><linearGradient id="lg" gradientUnits="userSpaceOnUse" x1="20" y1="6" x2="46" y2="58"><stop offset="0" stop-color="#a6c0ff"/><stop offset="1" stop-color="#5e8bff"/></linearGradient></defs><g transform="rotate(45 32 32)" fill="url(#lg)"><rect x="26" y="5" width="12" height="16" rx="5"/><rect x="29.5" y="21" width="5" height="3"/><rect x="30.5" y="23" width="3" height="25"/><path d="M30 48 H34 L33 55 H31 Z"/></g><g transform="rotate(-45 32 32)" stroke="url(#lg)" stroke-width="4" fill="none" stroke-linecap="round"><path d="M27 9 A7 7 0 1 0 37 9"/><line x1="32" y1="14" x2="32" y2="44"/><circle cx="32" cy="51" r="6"/></g></svg></span>
    <div class="meta">
      <div class="rt"><span class="live"></span> Public Lounge</div>
      <div class="sub"><span id="roomName">connecting…</span><span>👥 <b id="online">0</b> online</span><span>you are <b id="myAlias" style="color:var(--mint)">…</b></span></div>
    </div>
    <a class="leave" href="../">Leave</a>
  </div>

  <div id="xc-ann-slot"></div>
  <div class="feed" id="feed"></div>
  <div class="typing" id="typing"></div>
  <div class="encnote">🔒 Secure transport · messages aren't stored · <b>public room — anyone can join</b></div>

  <div class="composer">
    <textarea id="input" rows="1" placeholder="Type a message…" maxlength="1000" autocomplete="off"></textarea>
    <button class="send" id="send" disabled aria-label="Send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/></svg></button>
  </div>
</div>

<div class="overlay" id="overlay"><div class="box"><div class="ring"></div><h2>Entering a secure room…</h2><p id="ovText">finding you a lounge</p></div></div>

<script>
var DEV = location.hostname==='localhost'||location.hostname==='127.0.0.1';
var HTTP = DEV ? 'http://localhost:8787' : 'https://xcipher.nazimtariq74074.workers.dev';
var WSB  = DEV ? 'ws://localhost:8787'   : 'wss://xcipher.nazimtariq74074.workers.dev';

var feed=document.getElementById('feed'),input=document.getElementById('input'),send=document.getElementById('send'),
    onlineEl=document.getElementById('online'),roomName=document.getElementById('roomName'),myAliasEl=document.getElementById('myAlias'),
    overlay=document.getElementById('overlay'),ovText=document.getElementById('ovText'),typingEl=document.getElementById('typing');

var ws=null, myId=null, myAlias=null, room=null, retry=0, typingTimer=null, lastTyping=0;
var BAD=/\b(fuck|shit|bitch|asshole|bastard|cunt|dick|nigger|faggot|slut|whore|randi|chutiya|madarchod|bhenchod|gaand|lund|harami)\b/gi;
function clean(t){return t.replace(BAD,function(m){return m[0]+'•'.repeat(Math.max(1,m.length-1));});}
function esc(s){return s.replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function time(ts){var d=new Date(ts);return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
function atBottom(){return feed.scrollHeight-feed.scrollTop-feed.clientHeight<80;}
function scroll(){feed.scrollTop=feed.scrollHeight;}

function addMsg(m){
  var stick=atBottom();
  var el=document.createElement('div');
  el.className='msg'+(m.id===myId?' me':'');
  el.innerHTML='<span class="who" style="color:'+(m.color||'#8ea3c4')+'">'+esc(m.alias||'?')+'</span>'+
               '<span class="bub">'+esc(m.text)+'</span><span class="tm">'+time(m.ts)+'</span>';
  feed.appendChild(el); if(stick)scroll();
}
function addSys(text,cls){var el=document.createElement('div');el.className='sys '+(cls||'');el.textContent=text;feed.appendChild(el);if(atBottom())scroll();}

function connect(){
  ovText.textContent='finding you a lounge';
  fetch(HTTP+'/api/public/join').then(function(r){return r.json();}).then(function(d){
    if(!d.room) throw new Error('no room');
    room=d.room; onlineEl.textContent=d.online||0;
    ovText.textContent='connecting to '+room.replace('public-','room ');
    openWs();
  }).catch(function(){ ovText.textContent='server offline — retrying…'; setTimeout(connect, 2000); });
}

function openWs(){
  ws=new WebSocket(WSB+'/api/room?r='+encodeURIComponent(room));
  var gotWelcome=false;
  ws.onmessage=function(ev){
    var m; try{m=JSON.parse(ev.data);}catch(e){return;}
    if(m.type==='welcome'){
      gotWelcome=true; myId=m.id; myAlias=m.alias; retry=0;
      myAliasEl.textContent=m.alias; roomName.textContent=m.room.replace('public-','Room ');
      onlineEl.textContent=m.online; overlay.classList.add('hide');
      addSys('You joined as '+m.alias,'join');
    }
    else if(m.type==='chat'){ addMsg(m); }
    else if(m.type==='presence'){ onlineEl.textContent=m.online; }
    else if(m.type==='sys'){ addSys(m.text); }
    else if(m.type==='typing'){ showTyping(m.alias); }
  };
  ws.onclose=function(){
    if(!gotWelcome){ // likely room full or server hiccup → re-join
      retry++; ovText.textContent='room was full — finding another…';
      setTimeout(connect, Math.min(400*retry,2500));
    } else {
      overlay.classList.remove('hide'); ovText.textContent='reconnecting…';
      setTimeout(connect, 1200);
    }
  };
  ws.onerror=function(){ try{ws.close();}catch(e){} };
}

var typingHideTimer=null;
function showTyping(alias){ typingEl.textContent=alias+' is typing…'; clearTimeout(typingHideTimer); typingHideTimer=setTimeout(function(){typingEl.textContent='';},1500); }

function sendMsg(){
  var t=input.value.trim(); if(!t||!ws||ws.readyState!==1)return;
  t=clean(t).slice(0,1000);
  ws.send(JSON.stringify({type:'chat',text:t}));
  input.value=''; autosize(); send.disabled=true;
}
function autosize(){input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px';}

input.addEventListener('input',function(){
  autosize(); send.disabled=!input.value.trim();
  var now=Date.now(); if(ws&&ws.readyState===1&&now-lastTyping>1200){lastTyping=now;ws.send(JSON.stringify({type:'typing'}));}
});
input.addEventListener('keydown',function(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} });
send.addEventListener('click',sendMsg);

connect();
</script>
<script src="../announce.js" defer></script>
</body>
</html>
