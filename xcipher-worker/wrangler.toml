name = "xcipher"
main = "src/index.js"
compatibility_date = "2026-06-01"

# Durable Objects power the real-time rooms (free tier = SQLite-backed classes)
[[durable_objects.bindings]]
name = "CHATROOM"
class_name = "ChatRoom"

[[durable_objects.bindings]]
name = "LOBBY"
class_name = "Lobby"

[[durable_objects.bindings]]
name = "TEMPROOM"
class_name = "TempRoom"

[[durable_objects.bindings]]
name = "PRIVROOM"
class_name = "PrivateRoom"

[[durable_objects.bindings]]
name = "ANNOUNCE"
class_name = "Announce"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom", "Lobby"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["TempRoom"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["PrivateRoom"]

[[migrations]]
tag = "v4"
new_sqlite_classes = ["Announce"]
